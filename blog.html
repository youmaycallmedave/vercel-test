<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site — Blog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <div class="logo">MySite</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="contacts.html">Contacts</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <h1>Blog</h1>
      <p>Thoughts, guides, and updates from the team.</p>
    </section>

    <section class="blog-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Design">Design</button>
      <button class="filter-btn" data-filter="Deploy">Deploy</button>
      <button class="filter-btn" data-filter="Tips">Tips</button>
      <button class="filter-btn" data-filter="Dev">Dev</button>
    </section>

    <section class="blog-list" id="blog-list">
      <div class="blog-loading">Loading posts...</div>
    </section>
  </main>

  <footer>
    <p>© 2026 MySite. Built for Vercel testing.</p>
  </footer>

  <script src="sanity.js"></script>
  <script src="main.js"></script>

</html>
