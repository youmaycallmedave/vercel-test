<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site — Contacts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <div class="logo">MySite</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contacts.html" class="active">Contacts</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <h1>Contacts</h1>
      <p>Get in touch with us.</p>
    </section>

    <section class="contact-grid">
      <div class="card">
        <span class="icon">📧</span>
        <h3>Email</h3>
        <p><a href="mailto:hello@mysite.com">hello@mysite.com</a></p>
      </div>
      <div class="card">
        <span class="icon">📱</span>
        <h3>Phone</h3>
        <p>+1 (555) 000-1234</p>
      </div>
      <div class="card">
        <span class="icon">📍</span>
        <h3>Address</h3>
        <p>123 Main Street, San Francisco, CA</p>
      </div>
    </section>

    <section class="contact-form-section">
      <h2>Send a message</h2>
      <form class="contact-form" onsubmit="handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="What's this about?" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
        <p class="form-success" id="success-msg">Message sent! We'll get back to you soon.</p>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 MySite. Built for Vercel testing.</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
